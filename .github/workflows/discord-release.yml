name: Discord Release Notification
on:
  release:
    types: [published]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release to Discord
        shell: bash
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail
          BODY=$(jq -r '.release.body // ""' "$GITHUB_EVENT_PATH")
          CHANGES=$(echo "$BODY" | awk '
            /<!-- DISCORD_START -->/{flag=1; next}
            /<!-- DISCORD_END -->/{flag=0}
            flag
          ')
          if [ -z "$CHANGES" ]; then
            CHANGES="No changelog provided."
          fi
          CHANGES=$(echo "$CHANGES" | head -c 3500)
          CONTENT=$(jq -Rs . <<< "$CHANGES")

          PAYLOAD=$(jq -n \
            --arg title "$RELEASE_TITLE" \
            --arg version "$RELEASE_TAG" \
            --arg url "$RELEASE_URL" \
            --argjson content "$CONTENT" \
            '{
              content: "<@&1519341297188470874>",
              allowed_mentions: {
                parse: [],
                roles: ["1519341297188470874"]
              },
              embeds: [
                {
                  title: ("🚀 " + $title),
                  url: $url,
                  color: 5793266,
                  thumbnail: {
                    url: "https://cdn.discordapp.com/attachments/1452039397435244677/1458169510447153255/ChatGPT_Image_20_._2025_._17_38_56_1.png"
                  },
                  fields: [
                    {
                      name: "📦 Version",
                      value: ("`" + $version + "`"),
                      inline: true
                    },
                    {
                      name: "🔗 Release",
                      value: ("[Open on GitHub](" + $url + ")"),
                      inline: true
                    }
                  ],
                  description: ("## 🆕 Changelog\n\n" + $content),
                  footer: {
                    text: "Core Release System"
                  }
                }
              ]
            }')

          curl -sS -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
