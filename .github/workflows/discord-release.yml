name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord message
        run: |
          BODY='${{ github.event.release.body }}'

          CHANGES=$(echo "$BODY" | awk '/<!-- DISCORD_START -->/{flag=1; next} /<!-- DISCORD_END -->/{flag=0} flag')

          if [ -z "$CHANGES" ]; then
            CHANGES="No changelog provided."
          fi

          PAYLOAD=$(jq -n \
            --arg title "${{ github.event.release.name }}" \
            --arg version "${{ github.event.release.tag_name }}" \
            --arg url "${{ github.event.release.html_url }}" \
            --arg content "$CHANGES" \
            '{
              content: "<@&1519341297188470874>",
              allowed_mentions: { roles: ["1519341297188470874"] },
              components: [
                {
                  type: 17,
                  components: [
                    { type: 10, content: ("# 🚀 " + $title) },
                    { type: 10, content: ("**Version:** `" + $version + "`") },
                    { type: 14 },
                    { type: 10, content: ($content[0:3500]) },
                    {
                      type: 1,
                      components: [
                        {
                          type: 2,
                          style: 5,
                          label: "View Release",
                          url: $url
                        }
                      ]
                    }
                  ]
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$PAYLOAD" \
          ${{ secrets.DISCORD_WEBHOOK }}
