name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send to Discord
        uses: actions/github-script@v7
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          script: |
            const body = context.payload.release.body || "";

            const match = body.match(
              /<!-- DISCORD_START -->([\s\S]*?)<!-- DISCORD_END -->/
            );

            const changelog = match
              ? match[1].trim()
              : "No changelog provided.";

            const payload = {
              content: "<@&1519341297188470874>",
              allowed_mentions: {
                roles: ["1519341297188470874"]
              },
              flags: 32768,
              components: [
                {
                  type: 17,
                  components: [
                    {
                      type: 10,
                      content: `# 🚀 ${context.payload.release.name || context.payload.release.tag_name}`
                    },
                    {
                      type: 10,
                      content: `**Version:** \`${context.payload.release.tag_name}\``
                    },
                    {
                      type: 14
                    },
                    {
                      type: 10,
                      content: changelog.slice(0, 3500)
                    },
                    {
                      type: 1,
                      components: [
                        {
                          type: 2,
                          style: 5,
                          label: "View Release",
                          url: context.payload.release.html_url
                        }
                      ]
                    }
                  ]
                }
              ]
            };

            require("child_process").execSync(
              `curl -H "Content-Type: application/json" -X POST -d '${JSON.stringify(payload)}' "$DISCORD_WEBHOOK"`
            );
